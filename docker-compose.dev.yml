# docker-compose.dev.yml
# $ docker compose -f docker-compose.dev.yml up -d --build
# $ docker compose -f docker-compose.dev.yml cp api:/usr/local/lib/python3.13/site-packages ./_site_packages_dump/site-packages

version: "3.9"

name: backtest-service-dev

networks:
  grindurus:
    external: true

services:
  backtest-db:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - grindurus
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-backtest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backtest}
      POSTGRES_DB: ${POSTGRES_DB:-backtest}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-backtest} -d ${POSTGRES_DB:-backtest}"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  backtest-api:
    build: .
    restart: unless-stopped
    depends_on:
      backtest-db:
        condition: service_healthy
    networks:
      - grindurus
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-backtest}:${POSTGRES_PASSWORD:-backtest}@backtest-db:5432/${POSTGRES_DB:-backtest}
      X_ADMIN_KEY: ${X_ADMIN_KEY}
      X402_API_KEY: ${X402_API_KEY}
      X402_API_SECRET: ${X402_API_SECRET}
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload --reload-dir /app
    ports:
      - "8001:8001"
    volumes:
      - ./:/app

volumes:
  pgdata:
