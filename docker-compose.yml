services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: backtest
      POSTGRES_PASSWORD: backtest
      POSTGRES_DB: backtest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
