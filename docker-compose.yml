# docker-compose.yml
# $ docker compose up -d --build


version: "3.9"

name: backtest-service

networks:
  grindurus:
    external: true

services:
  db:
    image: postgres:16-alpine
    container_name: backtest-db
    restart: unless-stopped
    networks:
      - grindurus
    environment:
      POSTGRES_USER: backtest
      POSTGRES_PASSWORD: backtest
      POSTGRES_DB: backtest
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: backtest-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    networks:
      - grindurus
    environment:
      DATABASE_URL: postgresql+asyncpg://backtest:backtest@db:5432/backtest
      X_ADMIN_KEY: ${X_ADMIN_KEY}
      X402_API_KEY: ${X402_API_KEY}
      X402_API_SECRET: ${X402_API_SECRET}
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    labels:
      - traefik.enable=true
      - traefik.docker.network=grindurus

      # --- prod HTTP → HTTPS redirect ---
      - traefik.http.routers.backtest-api.rule=Host(`backtest.${DOMAIN:-localhost}`)
      - traefik.http.routers.backtest-api.tls.certresolver=le
      - traefik.http.routers.backtest-api.entrypoints=websecure

      # --- general backend ---
      - traefik.http.services.backtest-api.loadbalancer.server.port=8001

volumes:
  pgdata:
